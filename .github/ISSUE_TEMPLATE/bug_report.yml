name: Bug report
description: Report a ChunkyMonkey problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What broke or behaved incorrectly?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact actions needed to reproduce it.
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste diagnostics from ChunkyMonkey if safe to share. Remove secrets and private repo content.
